<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teleport MD — Provider flow map</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* Same board chrome as flowmap-r2.html. */
  *{box-sizing:border-box}
  body{margin:0;background:#0B0D10;color:#fff;font-family:Inter,system-ui,sans-serif;font-size:17px;padding:56px 40px 80px}
  .wrap{max-width:1100px;margin:0 auto}
  .eyebrow{font-size:13px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#D8FF47;margin:0 0 12px}
  h1{font-family:"Bricolage Grotesque",sans-serif;font-size:44px;line-height:1.05;letter-spacing:-.03em;margin:0 0 12px;font-weight:700}
  .lede{color:#A7ADB6;max-width:640px;line-height:1.55;margin:0 0 8px}
  a.open{color:#D8FF47;font-weight:600;text-decoration:none;font-size:15px}
  .flow{margin-top:40px}
  .flow-t{color:#fff;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:0 0 12px}
  .fchain{display:flex;align-items:center;gap:10px;overflow-x:auto;padding-bottom:6px}
  .fstep{display:flex;flex-direction:column;gap:8px;flex:none}
  .fnode{display:flex;gap:7px;align-items:center;background:#16191E;border:1px solid #2A2F38;border-radius:999px;padding:10px 18px;color:#E7E9EC;font:600 14px Inter;cursor:pointer;white-space:nowrap}
  .fnode:hover{border-color:#2D5BFF;color:#fff}
  .fnode .num{color:#D8FF47;font-variant-numeric:tabular-nums}
  .farr{flex:none;width:24px;height:2px;background:#3C424C;position:relative}
  .farr::after{content:'';position:absolute;right:-1px;top:-4px;border-left:7px solid #3C424C;border-top:5px solid transparent;border-bottom:5px solid transparent}
  .fnote{color:#868D97;font-size:13px;margin:10px 0 0;max-width:640px}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">Teleport MD &middot; Provider portal &middot; Direction 02 &middot; R1</p>
  <h1>Flow map</h1>
  <p class="lede">Every provider flow, screen by screen. Click any node to open that screen in the live portal.</p>
  <p><a class="open" href="index-provider.html">&larr; Back to the gallery</a></p>
  <div id="flowmap"></div>
</div>
<script src="screens-provider.js"></script>
<script>
/* Numbers match the gallery: SECTIONS flattened in order. */
const NUMS = {};
let n = 0;
SECTIONS.forEach(([, list]) => list.forEach(e => { n++; NUMS[e[0]] = [String(n).padStart(2, '0'), e[1]]; }));
/* Provider FLOWS steps are flat hashes; tolerate stacked arrays (patient grammar) too. */
document.getElementById('flowmap').innerHTML = FLOWS.map(([ft, steps, note]) => `
  <div class="flow">
    <p class="flow-t">${ft}</p>
    <div class="fchain">${steps.map(st => `<div class="fstep">${(Array.isArray(st) ? st : [st]).map(h =>
      `<button class="fnode" onclick="window.open('app-provider.html#${h}', '_blank')"><span class="num">${NUMS[h][0]}</span> ${NUMS[h][1]}</button>`).join('')}</div>`).join('<div class="farr"></div>')}</div>
    ${note ? `<p class="fnote">${note}</p>` : ''}
  </div>`).join('');
</script>
</body>
</html>
