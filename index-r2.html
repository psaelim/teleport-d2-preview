<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teleport MD — Patient app, Direction 02 · Revision 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{
    margin:0; background:#0B0D10; color:#fff;
    font-family:Inter,system-ui,sans-serif; font-size:17px;
    padding:56px 40px 80px;
  }
  .head{max-width:1200px;margin:0 auto 48px}
  .eyebrow{font-size:14px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#D8FF47;margin:0 0 12px}
  h1{font-family:"Bricolage Grotesque",sans-serif;font-size:52px;line-height:1.05;letter-spacing:-.03em;margin:0 0 16px;font-weight:700}
  .lede{color:#A7ADB6;max-width:640px;line-height:1.55;margin:0}
  .fb{
    max-width:640px;margin:24px 0 0;padding:16px 18px;border-radius:14px;
    background:#16191E;border-left:3px solid #2D5BFF;
    font-size:15px;line-height:1.55;color:#C9CCD2;
  }
  .fb b{color:#fff}
  .grid{
    display:grid; gap:56px 40px; max-width:1200px; margin:0 auto;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  }
  .gtitle{
    grid-column:1/-1;margin:28px 0 -16px;
    font-family:"Bricolage Grotesque",sans-serif;font-size:26px;font-weight:700;letter-spacing:-.02em;
    border-top:1px solid #1E2228;padding-top:28px;
  }
  .gtitle:first-child{border-top:0;padding-top:0;margin-top:0}
  figure{margin:0}
  .phone{
    position:relative;
    width:100%; max-width:320px; aspect-ratio:390/844;
    border-radius:38px; overflow:hidden;
    border:8px solid #23262C; background:#000;
    box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  /* V2 screens ship grayed out (June): a veil with a View button;
     one click lifts it and the screen shows in full color. */
  .veil{
    position:absolute; inset:0; z-index:2;
    display:flex; flex-direction:column; gap:12px;
    align-items:center; justify-content:center;
    background:rgba(11,13,16,.62);
    border:0; cursor:pointer; padding:0; width:100%;
    font:inherit; transition:opacity .25s ease-out;
  }
  .veil.off{opacity:0; pointer-events:none}
  .veil .vlab{color:#C9CCD2; font:600 13px/1 Inter}
  .veil .vbtn{background:#D8FF47; color:#111418; font:700 14px/1 Inter; padding:12px 24px; border-radius:999px}
  .veil:hover .vbtn{background:#E7FF7A}
  .phone:has(.veil:not(.off)) iframe{filter:grayscale(1)}
  @media (prefers-reduced-motion: reduce){.veil{transition:none}}
  iframe{width:390px;height:844px;border:0;transform-origin:0 0;display:block}
  figcaption{margin-top:16px;max-width:320px}
  .cap-t{font-weight:700;font-size:19px;letter-spacing:-.01em}
  .num{color:#D8FF47;font-variant-numeric:tabular-nums;margin-right:2px}
  .newtag{display:inline-block;vertical-align:2px;margin-left:6px;background:#D8FF47;color:#111418;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:999px}
  .toc{display:none}
  @media (min-width:900px){
    body{padding-left:280px}
    .toc{display:block;position:fixed;left:0;top:0;bottom:0;width:236px;overflow-y:auto;padding:28px 14px 40px;background:#0B0D10;border-right:1px solid #1E2228;z-index:10}
    .toc .toc-t{color:#868D97;font:600 12px/1 Inter;letter-spacing:.12em;text-transform:uppercase;margin:0 10px 12px}
    .toc details{margin-bottom:4px}
    .toc summary{cursor:pointer;padding:8px 10px;border-radius:8px;color:#fff;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
    .toc summary:hover{background:#16191E}
    .toc a{display:block;padding:6px 10px 6px 24px;border-radius:8px;color:#A7ADB6;text-decoration:none;font-size:14px;line-height:1.35}
    .toc .todo{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:6px 10px 6px 24px;color:#5A6069;font-size:13px;line-height:1.3}
    .stchip{flex:none;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:999px}
    .st-stub{background:#3A3113;color:#FFD54A}
    .st-planned{background:#1E2228;color:#868D97}
    .st-parked{background:transparent;border:1px solid #2A2F38;color:#5A6069}
    .toc-leg{color:#5A6069;font-size:11.5px;line-height:1.5;margin:14px 10px 0}
    .toc a:hover,.toc a.on{background:#16191E;color:#fff}
    figure[id]{scroll-margin-top:24px}
  }
  .cap-s{color:#868D97;font-size:15px;line-height:1.5;margin-top:4px}
  .fix{
    margin-top:10px;padding:10px 12px;border-radius:10px;
    background:#16191E;border-left:3px solid #FF6857;
    font-size:14px;line-height:1.5;color:#C9CCD2;
  }
  .fix b{color:#fff}
  .fix.new{border-left-color:#D8FF47}
  a.open{color:#D8FF47;font-weight:600;text-decoration:none;font-size:15px}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:28px;max-width:820px}
  .cardbtn{display:flex;flex-direction:column;text-align:left;background:#16191E;border:1px solid #2A2F38;border-radius:18px;overflow:hidden;cursor:pointer;padding:0;color:#fff;font:inherit;text-decoration:none;transition:border-color .15s ease,transform .15s ease,box-shadow .15s ease}
  /* June 2026-07-17: reviewers missed that these are clickable.
     Button affordances: lift on hover + an explicit arrow disc. */
  .cardbtn:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(0,0,0,.4)}
  .cardbtn:active{transform:scale(.99)}
  .cardbtn .art{height:112px;display:grid;place-items:center;background:#101318;width:100%}
  .cardbtn .art img{width:100%;height:112px;object-fit:cover;display:block}
  .cardbtn .meta{padding:14px 16px 16px;display:flex;align-items:center;gap:12px}
  .cardbtn .mtxt{flex:1;min-width:0}
  .cardbtn .t{display:block;font-weight:700;font-size:17px}
  .cardbtn .s{display:block;color:#868D97;font-size:13.5px;margin-top:3px;line-height:1.4}
  .cardbtn .go{flex:none;width:38px;height:38px;border-radius:999px;display:grid;place-items:center;border:2px solid rgba(255,255,255,.55);color:#fff;transition:background .15s ease,color .15s ease}
  .cardbtn:hover .go{background:#fff;color:#111418}
  .cb-volt .go,.cb-coral .go{border-color:rgba(17,20,24,.5);color:#111418}
  .cb-volt:hover .go,.cb-coral:hover .go{background:#111418;color:#fff}
  @media (prefers-reduced-motion: reduce){.cardbtn{transition:none}}
  /* June 2026-07-16: each card gets its own D2 color. The art strip
     stays dark; the base carries the hue. Ink text on volt/coral,
     white on electric, per the deck's contrast rules. */
  .cardbtn.cb-electric{background:#2D5BFF;border-color:#2D5BFF}
  .cardbtn.cb-electric .t{color:#fff}
  .cardbtn.cb-electric .s{color:#D9E2FF}
  .cardbtn.cb-electric:hover{border-color:#8FA8FF}
  .cardbtn.cb-volt{background:#D8FF47;border-color:#D8FF47}
  .cardbtn.cb-volt .t{color:#111418}
  .cardbtn.cb-volt .s{color:#454D19}
  .cardbtn.cb-volt:hover{border-color:#111418}
  .cardbtn.cb-coral{background:#FF6857;border-color:#FF6857}
  .cardbtn.cb-coral .t{color:#111418}
  .cardbtn.cb-coral .s{color:#4A1610}
  .cardbtn.cb-coral:hover{border-color:#111418}
  .map-sec{max-width:1200px;margin:0 auto 56px}
  .map-t{font-family:"Bricolage Grotesque",sans-serif;font-size:26px;font-weight:700;letter-spacing:-.02em;margin:0 0 6px}
  .map-s{color:#868D97;font-size:15px;margin:0 0 22px}
  .flow{margin-bottom:26px}
  .flow-t{color:#fff;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:0 0 10px}
  .fchain{display:flex;align-items:center;gap:10px;overflow-x:auto;padding-bottom:6px}
  .fstep{display:flex;flex-direction:column;gap:8px;flex:none}
  .fnode{display:flex;gap:7px;align-items:center;background:#16191E;border:1px solid #2A2F38;border-radius:999px;padding:9px 16px;color:#E7E9EC;font:600 14px Inter;cursor:pointer;white-space:nowrap}
  .fnode:hover{border-color:#2D5BFF;color:#fff}
  .fnode .num{color:#D8FF47;font-variant-numeric:tabular-nums}
  .farr{flex:none;width:22px;height:2px;background:#3C424C;position:relative}
  .farr::after{content:'';position:absolute;right:-1px;top:-4px;border-left:7px solid #3C424C;border-top:5px solid transparent;border-bottom:5px solid transparent}
  .fnote{color:#868D97;font-size:13px;margin:8px 0 0;max-width:640px}
</style>
</head>
<body>

<div class="head">
  <p class="eyebrow">Teleport MD &middot; Patient app &middot; Direction 02 &middot; Revision 2</p>
  <h1>Care that comes to you.</h1>
  <p class="lede">Patient app R2, rebuilt to the team feedback of July 15. Last updated July 16, 2026.</p>
  <div class="cards">
    <a class="cardbtn cb-electric" href="app-r2.html" target="_blank">
      <span class="art"><img src="img/card-prototype.jpg" alt=""></span>
      <span class="meta"><span class="mtxt"><span class="t">Live prototype</span><span class="s">Drive all 36 screens like the real app</span></span><span class="go" aria-hidden="true"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h12M10 4l5 5-5 5"/></svg></span></span>
    </a>
    <a class="cardbtn cb-volt" href="flowmap-r2.html">
      <span class="art"><svg viewBox="0 0 176 64" width="176" height="64" fill="none" aria-hidden="true">
  <rect x="3" y="24" width="42" height="17" rx="8.5" stroke="#D8FF47" stroke-width="2"/>
  <path d="M45 32.5h14" stroke="#3C424C" stroke-width="2"/><path d="M63 32.5l-6-3.4v6.8z" fill="#3C424C"/>
  <rect x="66" y="6" width="42" height="17" rx="8.5" stroke="#2D5BFF" stroke-width="2"/>
  <rect x="66" y="41" width="42" height="17" rx="8.5" stroke="#2D5BFF" stroke-width="2"/>
  <path d="M108 14.5h12l8 14M108 49.5h12l8-14" stroke="#3C424C" stroke-width="2"/>
  <path d="M131 32.5l-6.8-1.6 2.4 6.4z" fill="#3C424C"/>
  <rect x="132" y="24" width="42" height="17" rx="8.5" fill="#2D5BFF"/>
</svg></span>
      <span class="meta"><span class="mtxt"><span class="t">Flow map</span><span class="s">Every flow, screen by screen, clickable</span></span><span class="go" aria-hidden="true"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h12M10 4l5 5-5 5"/></svg></span></span>
    </a>
    <button class="cardbtn cb-coral" onclick="document.querySelector('.grid').scrollIntoView({behavior:'smooth'})">
      <span class="art"><svg viewBox="0 0 150 64" width="150" height="64" fill="none" aria-hidden="true">
  <rect x="2" y="4" width="33" height="26" rx="6" fill="#2D5BFF"/>
  <rect x="39" y="4" width="33" height="26" rx="6" fill="#D8FF47"/>
  <rect x="76" y="4" width="33" height="26" rx="6" fill="#FF6857"/>
  <rect x="113" y="4" width="33" height="26" rx="6" fill="#23262C" stroke="#3C424C"/>
  <rect x="2" y="34" width="33" height="26" rx="6" fill="#1E2228" stroke="#2A2F38"/>
  <rect x="39" y="34" width="33" height="26" rx="6" fill="#1E2228" stroke="#2A2F38"/>
  <rect x="76" y="34" width="33" height="26" rx="6" fill="#1E2228" stroke="#2A2F38"/>
  <rect x="113" y="34" width="33" height="26" rx="6" fill="#1E2228" stroke="#2A2F38"/>
</svg></span>
      <span class="meta"><span class="mtxt"><span class="t">Screen gallery</span><span class="s">36 built screens with annotations and status</span></span><span class="go" aria-hidden="true"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h12M10 4l5 5-5 5"/></svg></span></span>
    </button>
  </div>
</div>

<nav class="toc" id="toc" aria-label="Screen index"></nav>
<div class="grid" id="grid"></div>

<script src="screens-r2.js"></script>
<script>
/* Story order: the door, the crew path (the headline act), then
   the video path, then the everyday surfaces. */
/* screen + flow data now lives in screens-r2.js (shared) */

const grid = document.getElementById('grid');
let gn = 0;
grid.innerHTML = SECTIONS.map(([sec, list]) => {
  const isV2 = sec.startsWith('V2');
  return `
  <h2 class="gtitle">${sec}</h2>` + list.map(([hash,title,sub,fix,isNew]) => { gn++; return `
  <figure id="s-${hash}">
    <div class="phone"><iframe src="app-r2.html#${hash}" loading="lazy" title="${title}"></iframe>${isV2 ? `
      <button class="veil" aria-label="Show the ${title} design (hidden in V1)"
              onclick="this.classList.add('off')">
        <span class="vlab">Hidden in V1</span><span class="vbtn">View design</span>
      </button>` : ''}</div>
    <figcaption>
      <div class="cap-t"><span class="num">${String(gn).padStart(2,'0')}</span> ${title}${isNew ? ' <span class="newtag">new</span>' : ''}</div>
      <div class="cap-s">${sub}</div>
      <div class="fix${isNew ? ' new' : ''}">${fix}</div>
    </figcaption>
  </figure>`; }).join(''); }).join('');

// left index: flow sections as dropdowns, click to jump
let tn = 0;
const BMAP = Object.fromEntries(BACKLOG);
const tocSection = (sec, list) => `<details open><summary>${sec}</summary>` +
  (list || []).map(([h, t2]) => { tn++; return `<a href="#s-${h}"><span class="num">${String(tn).padStart(2,'0')}</span> ${t2}</a>`; }).join('') +
  (BMAP[sec] || []).map(([lb, st]) => `<div class="todo"><span>${lb}</span><span class="stchip st-${st}">${st}</span></div>`).join('') +
  '</details>';
document.getElementById('toc').innerHTML = '<p class="toc-t">Screens</p>' +
  SECTIONS.map(([sec, list]) => tocSection(sec, list)).join('') +
  BACKLOG.filter(([sec]) => !SECTIONS.some(([s2]) => s2 === sec)).map(([sec]) => tocSection(sec, [])).join('') +
  '<p class="toc-leg">planned: not designed yet &middot; parked: deliberately out. The "V2" section holds built screens hidden from V1 flows (pricing, per the July 17 team call); the full deferral list lives in V2-FEATURES.md.</p>';
const tocObs = new IntersectionObserver(es => es.forEach(e => {
  if (!e.isIntersecting) return;
  document.querySelectorAll('.toc a').forEach(a =>
    a.classList.toggle('on', a.getAttribute('href') === '#' + e.target.id));
}), { rootMargin: '-15% 0px -65% 0px' });
document.querySelectorAll('figure[id]').forEach(f => tocObs.observe(f));

// scale each 390px iframe down into its phone shell
function fit(){
  document.querySelectorAll('.phone').forEach(p=>{
    const f=p.querySelector('iframe');
    const s=p.clientWidth/390;
    f.style.transform=`scale(${s})`;
    f.style.height=(p.clientHeight/s)+'px';
  });
}
addEventListener('resize',fit); addEventListener('load',fit); fit();
</script>
</body>
</html>
