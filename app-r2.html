<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Teleport MD — Patient (R2)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app-r2.css">
</head>
<body>

<div class="app" id="app"></div>

<script>
/* ============================================================
   Teleport MD — patient prototype
   Direction 02 "Modern Consumer" — REVISION 2 (2026-07-16)

   A copy of app.html revised to the coworker feedback on the
   shared D2: keep the old app's stages but make each as simple
   as possible; lead with the Crew at-home service, not the
   provider-patient video call; add sign up / login. The original
   app.html is untouched.

   R2 changes:
   - Home hero = the at-home crew visit; video visit is secondary
   - Get care reordered: blood draw at home first
   - Sign up (identity only) + text-code verify screens are new
   - At-home booking ends in an honest "Requested" state (the real
     Pending Crew stage); video visits still confirm instantly
   ============================================================ */

/* All photography is generated in June's Higgsfield account (brand
   rule: real-photography look, no stock). Each image was opened and
   looked at before being assigned. Local copies in img/; Higgsfield
   job ids in img/SOURCES.md. */
const DR_ANAND      = 'img/dr-anand-avatar.png'; // Priya avatar: same face as the call, generated w/ face reference
const DR_ANAND_CALL = 'img/dr-anand.png';        // Priya on the call: doctor at desk, electric-blue wall (June's pick)
const DR_BELL   = 'img/dr-bell.png';       // male cardiologist, clinic corridor
const SELF      = 'img/maya.png';          // Maya: sofa self-view, front-camera framing
const CREW_JEN  = 'img/crew-jennifer-face.png'; // headshot crop; full doorstep scene in crew-jennifer.png
const CREW_HERO = 'img/hero-nurse-tree.png';    // R2 home hero: nurse at the door + foreground branches (June's pick B, job ad3c037f; base scene 916667d1)
const ROUTE_MAP = 'img/route-map.png';     // flat map, electric route on paper cream

/* V2 view flag (June, 2026-07-17): open any screen with ?v2 in the
   URL to render the V2 variant (pricing elements restored). The
   local gallery stacks these behind the V1 phones as a reminder;
   without the flag everything below renders pure V1. */
const V2VIEW = new URLSearchParams(location.search).has('v2');

const state = {
  day: 1, slot: null, need: null, muted: false, camOff: false, npi: false, vtab: 0, photo: null,
  ob: 0,                                     // which onboarding slide is showing
  /* R2.1 — the ten former stubs are real screens now, so the app
     carries real (in-page) state for all of them: */
  fields: {                                  // Personal info, editable one at a time
    name: 'Maya Wells', dob: 'March 14, 1992', phone: '(555) 000-1234',
    email: 'maya.wells@gmail.com', addr: '122 E 81st St, Apt 4B, New York, NY 10028',
    lang: 'English',
  },
  efield: 0,                                 // which field the editor shows
  insFront: null, insBack: null, insured: false,   // insurance card capture
  family: [], frel: 0, addfam: false,        // family & dependents
  cards: [['Visa', '0066']], card: 0, addcard: false, pb: 'you',  // payment methods
  tests: { lipid: true, vitals: true, cbc: false, a1c: false, vitd: false },  // the draw order
  addrs: [], addri: 0, addaddr: false,       // extra saved addresses (index 0 = home)
  spec: null,                                // doctor-search specialty filter
  bookfor: 0, fb: 'you',                     // who a booking is for; family back target
  cx: false, creason: null,                  // the live draw, cancelled
  /* R2.2 — five backlog screens built 2026-07-20, reviewed on
     mock-backlog-screens.html: */
  badcode: 0,                                // verify misses: 1-2 = wrong code, 3 = fresh code sent
  ttab: 0,                                   // Terms & privacy: 0 = terms, 1 = privacy
  rday: 2, rslot: null, moved: false,        // moving the video visit (own state: no scheduler bleed)
  vcx: false, vcreason: null,                // the video visit, cancelled
  /* R2.2b — the draw's missing states (built 2026-07-20, reviewed
     on mock-draw-states.html). Visiting #nodraw flips the live
     demo into the safe-stop timeline; rebooking clears it. */
  nodraw: false,                             // the draw stopped safely after two tries
  /* R2.2c — Visits search (built 2026-07-20, reviewed on
     mock-visits-search.html): */
  vq: '',                                    // the search query; empty = tabs as usual
  /* R2.2d — system states (built 2026-07-21, reviewed on
     mock-system-states.html). One switch flips the whole demo to
     day zero: ?fresh in the URL, or visiting #fresh. */
  fresh: new URLSearchParams(location.search).has('fresh'),
};

/* At-home draw catalogue: key, name, what it covers, price, and
   whether Dr. Anand ordered it. Collect and Price both read the
   selection, so the ledger can never disagree with the order. */
const TESTS = [
  ['lipid', 'Lipid panel', 'Cholesterol, HDL, LDL and triglycerides', 45, true],
  ['vitals', 'Vitals check', 'Blood pressure, pulse, oxygen, temperature', 20, false],
  ['cbc', 'Complete blood count', 'Red cells, white cells, platelets', 35, false],
  ['a1c', 'Hemoglobin A1c', 'Three-month blood sugar average', 30, false],
  ['vitd', 'Vitamin D', '25-hydroxy vitamin D level', 40, false],
];
const selTests = () => TESTS.filter(t => state.tests[t[0]]);
const testsTotal = () => selTests().reduce((a, t) => a + t[3], 0);

/* Personal info fields: key, label, input type, where the value is
   used (shown in the editor so an edit never feels consequence-free). */
const PFIELDS = [
  ['name', 'Legal name', 'text', 'Exactly as it appears on your ID or insurance card. It also sets your initials and the home-screen greeting.'],
  ['dob', 'Date of birth', 'text', 'Used to match you at the lab and with your insurer.'],
  ['phone', 'Phone', 'tel', 'We text sign-in codes, visit reminders and the nurse&rsquo;s updates here.'],
  ['email', 'Email', 'email', 'Receipts and visit summaries go here.'],
  ['addr', 'Home address', 'text', 'Where the nurse comes for at-home visits.'],
  ['lang', 'Preferred language', 'text', 'Your care team sees this before every visit.'],
];
const firstName = () => state.fields.name.trim().split(/\s+/)[0] || 'there';
const initials = () => (state.fields.name.trim().split(/\s+/).map(w => w[0]).slice(0, 2).join('') || 'MW').toUpperCase();

/* Saved addresses: home always mirrors Personal info (one source of
   truth); anything added on the address screen appends after it. */
const addrList = () => {
  const a = state.fields.addr;
  const cut = a.indexOf(', New York');
  return [['Home', cut > 0 ? a.slice(0, cut) : a, cut > 0 ? a.slice(cut + 2) : ''], ...state.addrs];
};
const cardLabel = () => state.cards[state.card].join(' ···· ');

/* Booking payment row, both eras: V1 = static cash truth; V2 = the
   live selector (insurance-first once captured). Book and the
   doctor profile share this. */
const payRow = (from) => V2VIEW ? `
    <button class="row" onclick="state.pb='${from}';go('payment')">
      <span class="body">
        ${state.insured
          ? `<span class="title">Insurance &middot; BlueCross PPO</span>
             <span class="sub">Or ${cardLabel()} &middot; charged only if not covered</span>`
          : `<span class="title">${cardLabel()}</span>
             <span class="sub">Add your insurance card on You to use your plan instead</span>`}
      </span>
      <span class="chev">${I.chev}</span>
    </button>` : `
    <div class="row" style="cursor:default">
      <span class="body">
        <span class="title">Cash</span>
        <span class="sub">You pay at the visit; the app never takes a card.</span>
      </span>
    </div>`;

/* Photo/card capture: real pickers, even in the prototype. The
   chosen image never leaves the page (FileReader -> data URL). */
window.loadShot = (inp, key) => {
  const f = inp.files && inp.files[0];
  if (!f) return;
  const r = new FileReader();
  r.onload = (e) => { state[key] = e.target.result; render(); };
  r.readAsDataURL(f);
};
window.loadPhoto = (inp) => loadShot(inp, 'photo');

/* R2.2d — busy buttons, one grammar for every CTA: while the action
   is pending the label becomes the verb in progress, same size,
   same place; disabled kills double-submit. The button never
   shrinks to a spinner, and success stays the existing full-screen
   moment (Requested / Booked / You're moved) — no toast. */
window.busyGo = (btn, verb, route) => {
  if (btn.disabled) return;
  btn.disabled = true; btn.style.opacity = .55; btn.textContent = verb;
  setTimeout(() => go(route), 700);
};
const meAvatar = (cls) => state.photo
  ? `<img class="avatar ${cls}" src="${state.photo}" alt="Your profile photo">`
  : `<span class="avatar ${cls} initials">${initials()}</span>`;

/* ---------- icons ---------- */
const I = {
  /* back/chev come from the line set; back is the chevron flipped. */
  back:  '<img src="img/icons/ph-line/chevron.svg" alt="" style="width:20px;height:20px;object-fit:contain;transform:rotate(180deg)">',
  chev:  '<img src="img/icons/ph-line/chevron.svg" alt="" style="width:16px;height:16px;object-fit:contain;opacity:.5">',
  home:  '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 10 9-7 9 7v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>',
  cal:   '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>',
  chat:  '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a8 8 0 0 1-11.5 7.2L3 21l1.8-6.5A8 8 0 1 1 21 12Z"/></svg>',
  user:  '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M5 21a7 7 0 0 1 14 0"/></svg>',
  mic:   '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg>',
  micOff:'<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18M9 9v2a3 3 0 0 0 4.5 2.6M15 11V6a3 3 0 0 0-5.9-.8M5 11a7 7 0 0 0 10.9 5.8M12 18v3"/></svg>',
  cam:   '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="12" height="12" rx="2"/><path d="m15 10 6-3v10l-6-3"/></svg>',
  camOff:'<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18M15 10l6-3v10M11 6h2a2 2 0 0 1 2 2v2m0 4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8"/></svg>',
  end:   '<svg width="22" height="22" fill="currentColor"><path d="M12 9c-1.6 0-3.15.25-4.6.7v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08a.99.99 0 0 1-.29-.7c0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .27-.11.52-.29.7l-2.48 2.46c-.18.18-.43.29-.71.29-.27 0-.52-.1-.7-.28a11.27 11.27 0 0 0-2.67-1.85.996.996 0 0 1-.56-.9v-3.1C15.15 9.25 13.6 9 12 9Z"/></svg>',
  cc:    '<svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M10 10.5a2 2 0 1 0 0 3M17 10.5a2 2 0 1 0 0 3"/></svg>',
  lock:  '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="10" width="18" height="11" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/></svg>',
  tick:  '<svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 13 4 4L19 7"/></svg>',
  /* Need-tile icons. Line icons, not emoji: the brand deck's
     standing rule is real imagery and drawn marks, never cartoon. */
  nVideo: '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="13" height="13" rx="3"/><path d="m15 11 7-4v11l-7-4"/></svg>',
  nDrop:  '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.7s6 6.4 6 10.5a6 6 0 0 1-12 0c0-4.1 6-10.5 6-10.5Z"/></svg>',
  nRx:    '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4h5a3.5 3.5 0 0 1 0 7H5zm0 7 9 9m-.5-4.5 4.5-4.5"/><path d="M5 4v16"/></svg>',
  nMind:  '<svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4a4 4 0 0 0-4 4 3.5 3.5 0 0 0-1 6.8V17a3 3 0 0 0 5 2.2A3 3 0 0 0 17 17v-2.2A3.5 3.5 0 0 0 16 8a4 4 0 0 0-4-4Z"/><path d="M12 4v16"/></svg>',
};

/* ---------- helpers ---------- */
const el = (h) => { const d = document.createElement('div'); d.innerHTML = h.trim(); return d.firstElementChild; };
const go = (r) => { location.hash = r; };
const app = document.getElementById('app');

/* Standalone only (app-r2.html opened directly): on wide screens the
   app sits in a phone bezel like the gallery, scaled to FIT the
   viewport height (June: it was cut off on shorter desktops).
   Inside the review board's live frame #app is nested, so none of
   this fires there. */
if (app.parentElement === document.body) {
  document.body.classList.add('standalone');
  const fitFrame = () => {
    const wide = window.matchMedia('(min-width: 500px)').matches;
    const s = Math.min(1, (innerHeight - 40) / 860, (innerWidth - 40) / 406);
    app.style.transform = wide ? `translate(-50%, -50%) scale(${s})` : '';
  };
  addEventListener('resize', fitFrame);
  fitFrame();
}

/* Icon cache-buster: Safari on the phone kept serving stale icon
   PNGs after we edited them in place (June caught the old bell).
   BUMP THIS whenever any img/icons file changes. */
const ICONS_V = '4';

/* Tab icons: Phosphor (June's pick, 2026-07-20; replaced the
   Higgsfield-sliced PNG set). Colored variant SVGs generated from
   @phosphor-icons/core into img/icons/ph-line + ph-fill; same
   -w/-e/-g suffix scheme as before. Active tab = fill weight,
   electric; inactive dims via opacity. */
function tabbar(active) {
  /* R2 round 2 (June, old design as ref): the Messages tab becomes
     a NOTIFICATIONS tab — one feed for everything (messages, lab
     results, crew, reminders). Messages live under You now. */
  const t = [
    ['home',  'Home',   'home'],
    ['visits','Visits', 'calendar'],
    ['notifs','Notifications', 'bell'],
    ['you',   'You',    'profile'],
  ];
  return `<nav class="tabbar">${t.map(([r, label, ico]) => `
    <button class="tab" ${active === r ? 'aria-current="page"' : ''} onclick="go('${r}')">
      <span class="ico">
        <img src="img/icons/${active === r ? 'ph-fill' : 'ph-line'}/${ico}${active === r ? '-e' : ''}.svg" alt="">
        ${r === 'notifs' ? '<span class="tbadge" aria-label="3 unread notifications">3</span>' : ''}
      </span><span>${label}</span>
    </button>`).join('')}</nav>`;
}

const bar = (title, back) => `
  <header class="topbar">
    ${back ? `<button class="back" aria-label="Back" onclick="go('${back}')">${I.back}</button>` : ''}
    <h1>${title}</h1>
  </header>`;

/* ============================================================
   HOME
   FIXES: the old home was "Hello, Max!" + a persistent
   "Profile Set Up" nag whose 4-step progress bar was clipped off
   the right edge, then an undifferentiated stack of cards with
   two competing CTAs ("Make  An Appointment" / "Request
   Collection") and a card titled "#WO1".
   NOW: one question, one live thing, one next action.
   ============================================================ */
function Home(offline) {
  /* R2.2d — #offline: the truth bar variant. Offline is a place,
     not an error: ink, never coral, and cached content stays fully
     readable, never grayed out. The strip disappears on reconnect
     and anything queued (a booking, a message) sends itself, with
     the existing notification grammar confirming it went. */
  if (offline) return `
  <div class="offbar">You&rsquo;re offline.<span class="sub">Showing the latest we have.</span></div>
  <div class="scroll">
    <p class="greet" style="margin-top:8px">Hi ${firstName()}.</p>
    <h1 class="display">How can we help?</h1>
    <div class="card" style="display:flex;gap:16px;align-items:center">
      <img class="avatar lg" src="${DR_ANAND}" alt="">
      <div>
        <div style="font-weight:700;font-size:19px">Dr. Priya Anand</div>
        <div class="tiny">Video visit &middot; ${vWhenShort()}</div>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <div style="font-weight:700;margin-bottom:4px">What still works</div>
      <div class="tiny">Everything you have already loaded &mdash; visits, results,
        addresses. Booking and messages will send the moment you are back;
        calling never needed the app.</div>
    </div>
  </div>
  ${tabbar('home')}`;
  return `
  <div class="scroll">
    <!-- Brand row (June's pick, placement 1 of 4): the F20 mark +
         wordmark, HOME ONLY - no other screen carries it. -->
    <div class="brandrow"><img src="img/logo-f20.png" alt=""><span class="bw">Teleport&nbsp;MD</span></div>
    <p class="greet">Hi ${firstName()}.</p>
    <h1 class="display">How can we help?</h1>

    <!-- R2: the coworker asked us to highlight the crew service
         over the provider-patient video call. The hero is now the
         thing only Teleport does: a licensed nurse at your door. -->
    <div class="card-hero" style="padding:0;overflow:hidden">
      <img class="hero-img" src="${CREW_HERO}" alt="A Teleport nurse arriving at a front door">
      <div style="padding:20px 24px 24px">
        <p class="kicker">Care that comes to you</p>
        <p class="headline">A licensed nurse, at your door.</p>
        <button class="btn btn-emphasis" onclick="go('collect')">Book an at-home visit</button>
      </div>
    </div>

    <!-- Ink second-act card (June's pick B), now the GET CARE door:
         one entry to all four care paths. Copy = June's pick. -->
    <button class="row video-ink" style="margin-top:12px;padding:16px" onclick="go('getcare')">
      <span class="vdisc"><img src="img/icons/ph-fill/vitals-w.svg" alt=""></span>
      <span class="body">
        <span class="title">Get care, your way</span>
        <span class="sub">Video visit, at your home, or your results</span>
      </span>
      <span class="chev"><img src="img/icons/ph-line/chevron-w.svg" alt="" style="width:16px;height:16px;object-fit:contain;opacity:.7"></span>
    </button>

    ${state.fresh || state.cx ? '' : state.nodraw ? `
    <h2 class="section">Happening now</h2>

    <!-- R2.2b: the safe stop replaces the live card with a
         coral-edge attention row; rebooking makes it vanish. -->
    <button class="row" onclick="go('nodraw')" style="align-items:flex-start;padding:16px;border-left:4px solid var(--raw-coral)">
      <span class="nicon"><img src="img/icons/ph-fill/drop.svg" alt=""></span>
      <span class="body">
        <span class="pill pill-urgent" style="margin-bottom:6px">Needs a new time</span>
        <span class="title">We couldn&rsquo;t finish today&rsquo;s draw</span>
        <span class="sub">Stopped safely &middot; your order is kept, pick a new time</span>
      </span>
      <span class="chev">${I.chev}</span>
    </button>` : `
    <h2 class="section">Happening now</h2>

    <!-- The live at-home draw. In the old app this was a card
         titled "#WO1" with "Work Type:" and "Pending Crew".
         Cancelling the visit removes it here, not just on Track. -->
    <button class="row" onclick="go('track')" style="align-items:flex-start;padding:16px">
      <img class="avatar" src="${CREW_JEN}" alt="">
      <span class="body">
        <span class="pill pill-en-route" style="margin-bottom:6px">On the way</span>
        <span class="title">Jennifer is driving to you</span>
        <span class="sub">Blood draw at home &middot; arrives about 2:40 PM</span>
      </span>
      <span class="chev">${I.chev}</span>
    </button>`}

    ${state.fresh || state.vcx ? '' : `
    <h2 class="section">Next up</h2>
    <!-- R2.2: the row opens the visit hub (manage) — reschedule,
         cancel and, 10 minutes out, Join all live there. -->
    <button class="row" onclick="go('manage')" style="padding:16px">
      <img class="avatar" src="${DR_ANAND}" alt="">
      <span class="body">
        <span class="title">Dr. Priya Anand</span>
        <span class="sub">Video visit &middot; ${vWhenShort()}</span>
      </span>
      <span class="chev">${I.chev}</span>
    </button>`}

    <!-- FIXES: the old app nagged about profile completion on every
         screen, forever. This appears only because insurance is
         genuinely missing and it will block the next claim; the
         moment the card is captured it is gone for good. -->
    ${state.fresh || state.insured ? '' : `
    <div class="banner" style="margin-top:24px">
      <div>
        <div class="t">Add your insurance card</div>
        <div>We need it before your visit tomorrow, or you will be billed at the cash rate.</div>
        <button class="btn btn-secondary" style="margin-top:12px;width:auto;padding:0 20px" onclick="go('insurance')">Add card</button>
      </div>
    </div>`}
  </div>
  ${tabbar('home')}`;
}

/* ============================================================
   GET CARE — need-first triage
   FIXES: the old booking flow step 2 was "Search Provider" with
   SEVEN fields (Practice, Specialty, City, State, first name,
   last name, and NPI NUMBER) and the instruction "Please fill up
   at least two fields." A patient does not know an NPI number.
   NOW: start from what is wrong, not from a provider directory.
   ============================================================ */
function GetCare() {
  /* Palette rule decides the icon variant: electric/ink tiles
     take the WHITE (-w) glyph, volt/coral take the ink glyph. */
  /* R2 round 2 (team feedback via June, 2026-07-16): Rx refill and
     therapist are OUT (not real features). The two crew services +
     video + results make the four. Doctor choice now lives INSIDE
     the video flow ('doctors'), so the care-team list moved there
     and this screen is just the four doors. */
  /* June's re-cut (2026-07-16 v3): one at-home door (the chooser
     screen picks the service), video, visits, results. */
  const needs = [
    ['Get care at home', 'need-electric', 'homecare-w', 'collect'],
    ['Video visit', 'need-volt', 'video', 'doctors'],
    ['My visits', 'need-coral', 'calendar', 'visits'],
    ['Lab results', 'need-ink', 'flask-w', 'results'],
  ];
  return `
  ${bar('Get care', 'home')}

/* ============================================================

function Track(lateForce) {

  /* R2.2b — the late state lives at #late (board + flow map); in

  const late = lateForce || false;

    </div>

    <div class="card" style="margin-top:12px;padding:0;overflow:hidden">

        <div class="step done">

        </div>

/* ============================================================
   VISITS
   FIXES: the old list mixed video-visit cards and "#WO1" work
   cards in the same tabs, with a search box that said "e.g. First
   Name, Last Name" while every card was titled by an ID you could
   not search for.

/* ============================================================
   VISITS — tab strip per June (old app's Appointments tabs:
   Pending / Upcoming / In Progress / Previous), in the same
   component as Lab results. Our states, plain words: a request
   is a request, and nothing is called a #WO1.
   ============================================================ */
function Visits(qForce) {
  /* Requested + Upcoming share one tab (June): the status pill
     already says which is which, so soonest-first in one list. */
  const vtabs = ['Upcoming', 'In progress', 'Past'];
  const t = state.vtab;
  /* R2.2d — day zero (#fresh): the tabs render, the search box
     hides until there is something to search, and each tab tells
     its first-run truth. The action is the real door (Get care,
     the four-tile screen), never a generic "browse"; Past's line
     is quieter on purpose — no button, nothing to sell. */
  if (state.fresh) {
    const fempty = [`
    <div class="empty">
      <img class="glyph" src="img/icons/ph-line/calendar.svg" alt="">
      <div style="font-weight:700;color:var(--text-primary);margin-bottom:6px">Nothing booked yet.</div>
      <div>A nurse at your door or a doctor on video &mdash; either takes about a
        minute to book.</div>
      <button class="btn btn-emphasis" style="margin-top:16px" onclick="go('getcare')">Get care</button>
    </div>`,
    '<div class="empty">Nothing in progress right now.</div>',
    '<div class="empty">Your history builds here after your first visit.</div>'];
    return `
  ${bar('Visits')}
  <div class="scroll">
    <div class="tabs">
      ${vtabs.map((n, i) => `
        <button class="tabx" aria-selected="${t === i}" onclick="state.vtab=${i};render()">${n}</button>`).join('')}
    </div>
    ${fempty[t]}
  </div>
  ${tabbar('visits')}`;
  }
  const vrow = (act, avatar, pillCls, pillTxt, title, sub) => `
    <button class="row" onclick="${act}" style="align-items:flex-start;padding:16px">
      ${avatar}
      <span class="body">
        <span class="pill ${pillCls}" style="margin-bottom:6px">${pillTxt}</span>
        <span class="title">${title}</span>
        <span class="sub">${sub}</span>
      </span>
      <span class="chev">${I.chev}</span>
    </button>`;
  /* R2.2c — Visits search (parked item un-parked, built 2026-07-20;
     reviewed on mock-visits-search.html). Every visit is data
     first: ONE list feeds both the tabs and the search, so the box
     can only match what a card really says — the old app promised
     name search over #WO1 cards; this box cannot lie that way.
     Entry: [tab, action, avatar, pillCls, pillTxt, title, sub,
     extra search words a patient might type that the card implies].
     Carried over per-row rules: the confirmed video visit opens
     its hub (manage); the safe-stop order is an Upcoming action,
     not history; cancelled visits are history, not live cards. */
  const AV_DROP = `<span class="nicon"><img src="img/icons/ph-fill/drop.svg" alt=""></span>`;
  const tnames = selTests().map(x => x[1]).join(', ');
  const visits = [
    ...(state.vcx ? [] : [[0, `go('manage')`, `<img class="avatar" src="${DR_ANAND}" alt="">`,
      'pill-accepted', 'Confirmed', 'Dr. Priya Anand', `${vWhenShort()} &middot; video visit`, 'video doctor primary care july']]),
    ...(state.nodraw ? [[0, `go('nodraw')`, AV_DROP,
      'pill-urgent', 'Needs a new time', 'Blood draw at home', 'Stopped safely today &middot; your order is kept', `${tnames} nurse jennifer reyes blood july`]] : []),
    [0, `go('accepted')`, AV_DROP,
      'pill-accepted', 'Confirmed', 'Blood draw at home', 'Wed, 10 AM - 12 PM &middot; Jennifer Reyes', `${tnames} nurse blood wednesday july`],
    [0, `go('declined')`, `<span class="avatar initials">SO</span>`,
      'pill-canceled', 'Practice full', 'Dr. Sarah Okafor', 'Thu, 2:30 PM &middot; the practice can&rsquo;t take new patients', 'video doctor thursday july'],
    ...(state.cx || state.nodraw ? [] : [[1, `go('track')`, `<img class="avatar" src="${CREW_JEN}" alt="">`,
      'pill-en-route', 'On the way', 'Blood draw at home', 'Today &middot; Jennifer Reyes', `${tnames} nurse blood today july`]]),
    ...(state.vcx ? [[2, `go('vcancel')`, `<img class="avatar" src="${DR_ANAND}" alt="">`,
      'pill-canceled', 'Cancelled', 'Dr. Priya Anand', 'Video visit &middot; cancelled by you', 'video doctor july']] : []),
    ...(state.cx ? [[2, `go('cancel')`, `<img class="avatar" src="${CREW_JEN}" alt="">`,
      'pill-canceled', 'Cancelled', 'Blood draw at home', 'Today &middot; cancelled before arrival', `${tnames} nurse jennifer reyes blood july`]] : []),
    [2, `go('summary')`, `<img class="avatar" src="${DR_BELL}" alt="">`,
      'pill-complete', 'Complete', 'Dr. Marcus Bell', '6 June &middot; notes and results ready', 'video doctor cardiology'],
    /* R2.2c: the two history rows are the same visits Results > All
       already shows, dates and all — the two surfaces agree. They
       open there, where their numbers live. */
    [2, `go('resultsall')`, `<img class="avatar" src="${DR_ANAND}" alt="">`,
      'pill-complete', 'Complete', 'Dr. Priya Anand', '2 April &middot; annual physical, full panel', 'doctor lipid cholesterol glucose vitamin d a1c'],
    [2, `go('resultsall')`, AV_DROP,
      'pill-complete', 'Complete', 'Blood draw at home', '20 January &middot; lipid panel, vitamin D, A1c', 'nurse blood cholesterol draw'],
  ];
  const rawQ = qForce != null ? qForce : state.vq;
  const q = rawQ.trim().toLowerCase();
  const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
  const corpus = v => (v[4] + ' ' + v[5] + ' ' + v[6] + ' ' + v[7]).replace(/&[a-z]+;/g, ' ').toLowerCase();
  const hits = q ? visits.filter(v => corpus(v).includes(q)) : [];
  const panels = [0, 1, 2].map(n => {
    const rows = visits.filter(v => v[0] === n).map(v => vrow(v[1], v[2], v[3], v[4], v[5], v[6])).join('');
    return rows || '<div class="empty">Nothing in progress right now.</div>';
  });
  return `
  ${bar('Visits')}
  <div class="scroll">
    <label class="vsearch">
      <input type="search" id="vq" placeholder="Doctor, test, or month" aria-label="Search your visits"
             value="${esc(rawQ)}" oninput="vqType(this.value)">
      ${rawQ ? '<button class="clear" onclick="vqClear()">Clear</button>' : ''}
    </label>
    ${q ? (hits.length ? `
    <p class="tiny" style="margin:0 0 8px" role="status">${hits.length} visit${hits.length === 1 ? ' matches' : 's match'} &ldquo;${esc(rawQ)}&rdquo;</p>
    ${hits.map(v => vrow(v[1], v[2], v[3], v[4], v[5], v[6])).join('')}` : `
    <div class="empty">
      <div class="big" aria-hidden="true">&empty;</div>
      <div style="font-weight:700;color:var(--text-primary);margin-bottom:6px">Nothing matches &ldquo;${esc(rawQ)}&rdquo;.</div>
      <div>Try a doctor, a test, or a month &mdash; like &ldquo;anand&rdquo;, &ldquo;lipid&rdquo;,
        or &ldquo;january&rdquo;. We search your visits, not your results &mdash; those have
        their own tabs.</div>
      <button class="btn btn-ghost" style="margin-top:16px" onclick="vqClear()">Clear search</button>
    </div>`) : `
    <div class="tabs">
      ${vtabs.map((n, i) => `
        <button class="tabx" aria-selected="${t === i}" onclick="state.vtab=${i};render()">${n}</button>`).join('')}
    </div>
    ${panels[t]}`}
  </div>
  ${tabbar('visits')}`;
}

/* R2.2d — #loading: the board's window onto Visits mid-fetch.
   Skeletons mirror the exact row they become (disc, pill, two
   lines = a visit row), the chrome renders instantly, and no
   spinner exists anywhere in the app. In production this appears
   only after a 300ms grace period — a fast load shows nothing at
   all; whether returning users see cached data instead is the

function VisitsLoading() {
  const skelrow = `
      <div class="skelrow"><span class="skel disc"></span><span style="flex:1"><span
        class="skel pill" style="display:block"></span><span class="skel l1" style="display:block"></span><span

  <div class="scroll">

      <input type="search" placeholder="Doctor, test, or month" aria-label="Search your visits" disabled>
    </label>
    <div class="tabs">
      ${['Upcoming', 'In progress', 'Past'].map((n, i) => `
        <button class="tabx" aria-selected="${i === 0}">${n}</button>`).join('')}
    </div>
    <div style="margin-top:12px" aria-busy="true" aria-label="Loading your visits">
      ${skelrow}${skelrow}${skelrow}
    </div>
  </div>
  ${tabbar('visits')}`;
}

/* Search typing re-renders, then puts the caret back. From the

  state.vq = '';
  if (location.hash === '#vsearch') { go('visits'); return; }
  render();
}

/* ============================================================
   LAB RESULTS — D2 port of the D3 screen (parity, June's pick).
   Values + status pills in D2's fill+ink grammar.
   ============================================================ */
function Results(tab = 0) {
  /* R2.2d — day zero: the first-run truth, no tabs to sell. */
  if (state.fresh) return `
  ${bar('', 'you')}
  <div class="scroll" style="padding-top:0">
    <h1 class="display">Lab results</h1>
    <div class="empty">
      <img class="glyph" src="img/icons/ph-line/flask.svg" alt="">
      <div style="font-weight:700;color:var(--text-primary);margin-bottom:6px">No results yet.</div>
      <div>They land here after your first draw &mdash; usually 2 to 3 days after
        the lab receives it, reviewed by your doctor first.</div>
    </div>
  </div>`;
  /* All three tabs are real now (All + Trends were stubs). Each
     tab is its own route so the back button and the gallery both
     behave; the data below is one history, told three ways. */
  const rows = [
    ['Total cholesterol', 'Ref 125&ndash;200 mg/dL', '182', 'complete', 'Normal'],
    ['Glucose, fasting',  'Ref 70&ndash;99 mg/dL',   '104', 'urgent',   'High'],
    ['Vitamin D',         'Ref 30&ndash;100 ng/mL',  '28',  'pending',  'Low'],
    ['Hemoglobin A1c',    'Ref under 5.7%',          '5.4', 'complete', 'Normal'],
  ];
  const resultRow = ([n, ref, val, cls, label]) => `
      <div class="result">
        <div class="l"><div class="n">${n}</div><div class="ref">${ref}</div></div>
        <div class="r"><span class="val">${val}</span><span class="pill pill-${cls}">${label}</span></div>
      </div>`;
  /* Six months of history: the same three draws feed All and Trends. */
  const draws = [
    ['July 14, 2026', 'Blood draw at home &middot; Jennifer Reyes', rows],
    ['April 2, 2026', 'Annual physical &middot; Dr. Priya Anand', [
      ['Total cholesterol', 'Ref 125&ndash;200 mg/dL', '188', 'complete', 'Normal'],
      ['Glucose, fasting',  'Ref 70&ndash;99 mg/dL',   '99',  'complete', 'Normal'],
      ['Vitamin D',         'Ref 30&ndash;100 ng/mL',  '24',  'pending',  'Low'],
      ['Hemoglobin A1c',    'Ref under 5.7%',          '5.5', 'complete', 'Normal'],
    ]],
    ['January 20, 2026', 'Blood draw at home', [
      ['Total cholesterol', 'Ref 125&ndash;200 mg/dL', '195', 'complete', 'Normal'],
      ['Glucose, fasting',  'Ref 70&ndash;99 mg/dL',   '96',  'complete', 'Normal'],
      ['Vitamin D',         'Ref 30&ndash;100 ng/mL',  '22',  'pending',  'Low'],
      ['Hemoglobin A1c',    'Ref under 5.7%',          '5.6', 'complete', 'Normal'],
    ]],
  ];
  /* Sparkline in the D2 grammar: ink line, colored endpoint. */
  const spark = (pts, lo, hi, end) => {
    const W = 280, H = 56, P = 7;
    const x = i => P + i * (W - 2 * P) / (pts.length - 1);
    const y = v => H - P - (v - lo) / (hi - lo) * (H - 2 * P);
    return `<svg class="spark" viewBox="0 0 ${W} ${H}" aria-hidden="true">
      <polyline points="${pts.map((v, i) => `${x(i)},${y(v)}`).join(' ')}" fill="none"
        stroke="var(--raw-ink)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        vector-effect="non-scaling-stroke"/>
      <circle cx="${x(pts.length - 1)}" cy="${y(pts.at(-1))}" r="5" fill="${end}"/></svg>`;
  };
  const trends = [
    ['Total cholesterol', '182 mg/dL', [195, 188, 182], 178, 199, 'var(--raw-electric)', 'complete', 'Improving',
     'Down 13 points since January. Whatever you are doing, keep doing it.'],
    ['Glucose, fasting', '104 mg/dL', [96, 99, 104], 94, 107, 'var(--raw-coral)', 'urgent', 'Rising',
     'Crossed the reference line this month. Dr. Anand left you a note about it.'],
    ['Vitamin D', '28 ng/mL', [22, 24, 28], 20, 30, 'var(--raw-electric)', 'pending', 'Below range',
     'Climbing since the winter, still under the 30 floor.'],
  ];
  const panels = [
    /* Recent */
    rows.map(resultRow).join('') + `
    <div class="card" style="margin-top:24px">
      <div style="font-weight:700;margin-bottom:4px">Dr. Anand has seen these.</div>
      <div class="tiny">The fasting glucose is worth a conversation, not an alarm. She left you a note.</div>
      <button class="btn btn-secondary" style="margin-top:14px" onclick="state.thread='anand';go('thread')">Read her message</button>
    </div>`,
    /* All: every draw, grouped by date */
    draws.map(([date, src, list]) => `
      <h2 class="section" style="margin-top:28px;margin-bottom:0">${date}</h2>
      <p class="tiny" style="margin:2px 0 4px">${src}</p>
      ${list.map(resultRow).join('')}`).join('') + `
    <p class="tiny" style="text-align:center;margin-top:24px">That&rsquo;s your full six months with Teleport.</p>`,
    /* Trends: three numbers over six months */
    trends.map(([n, val, pts, lo, hi, end, cls, verdict, note]) => `
      <div class="card" style="margin-top:12px">
        <div class="trend-head">
          <div><div style="font-weight:600">${n}</div><div class="val">${val}</div></div>
          <span class="pill pill-${cls}">${verdict}</span>
        </div>
        ${spark(pts, lo, hi, end)}
        <div class="spark-x"><span>Jan 20</span><span>Apr 2</span><span>Jul 14</span></div>
        <p class="tiny" style="margin:10px 0 0">${note}</p>
      </div>`).join(''),
  ];
  return `
  ${bar('', 'you')}
  <div class="scroll" style="padding-top:0">
    <p class="greet">Updated today</p>
    <h1 class="display">Lab results</h1>

    <div class="tabs">
      ${[['Recent', 'results'], ['All', 'resultsall'], ['Trends', 'trends']].map(([n, r], i) => `
      <button class="tabx" aria-selected="${tab === i}" onclick="go('${r}')">${n}</button>`).join('')}
    </div>

    ${panels[tab]}
  </div>`;
}

/* ============================================================
   VERIFY — net new in R2. One text code serves both sign-in
   and sign-up, so there is exactly one door into the app.
   Each digit box is its own 46x56 target, above the 44px floor.
   ============================================================ */
function Verify(force) {
  /* R2.2 — the wrong-code states (backlog, built 2026-07-20).
     Danger is text plus a ring on the boxes; misses are budgeted
     out loud, and the third miss texts a fresh code — the recovery
     IS the code, never a lockout. The board's #verifyerr route
     renders miss 1 via `force` without touching live state. */
  const bc = force || state.badcode;
  const digits = bc === 3 ? [] : bc ? ['8','2','4','1','0','9'] : ['8','2','4','1'];
  return `
  ${bar('', 'welcome')}
  <div class="scroll" style="padding-top:0">
    <h1 class="display sm">Enter the code.</h1>
    <p class="muted" style="margin-top:-12px">
      We texted a ${bc === 3 ? 'fresh' : '6-digit'} code to ${state.fields.phone}.
    </p>

    <div class="code-row" style="margin-top:28px">
      ${[1,2,3,4,5,6].map(n => `
        <input class="code${bc === 1 || bc === 2 ? ' err' : ''}" type="text" inputmode="numeric" maxlength="1"
               aria-label="Digit ${n}" ${bc === 1 || bc === 2 ? 'aria-invalid="true"' : ''}
               ${digits[n-1] ? `value="${digits[n-1]}"` : ''}>`).join('')}
    </div>
    ${bc === 1 || bc === 2 ? `
    <span class="errline" role="alert">That code didn&rsquo;t match.
      ${bc === 1 ? 'Two more tries' : 'One more try'}, then we&rsquo;ll text you a fresh one.</span>` : ''}
    ${bc === 3 ? `
    <span class="errline" role="alert" style="color:var(--text-secondary)">That code is used up. A fresh one is on its way.</span>` : ''}

    <div style="margin-top:28px">
      <button class="btn btn-primary" onclick="verifyGo()">Verify and continue</button>
      <button class="btn btn-ghost" style="margin-top:8px" onclick="newCode()">Text me a new code</button>
    </div>
    <p class="tiny" style="text-align:center;margin-top:16px">Codes expire after 10 minutes.</p>
  </div>`;
}

/* Success = six digits that are not the known-wrong demo code
   (824109, the one the error state shows). Anything else is a
   miss; the third miss becomes the fresh-code state. */
function verifyGo() {
  const v = [...app.querySelectorAll('.code')].map(b => b.value).join('');
  if (v.length === 6 && v !== '824109') { state.badcode = 0; go('home'); return; }
  state.badcode = state.badcode >= 2 ? 3 : state.badcode + 1;
  if (location.hash === '#verifyerr') go('verify'); else render();
}
function newCode() {
  state.badcode = 3;
  if (location.hash === '#verifyerr') go('verify'); else render();
}

  /* R2.2d — day zero: the empty feed is where the no-marketing
     promise gets said out loud. No action on purpose — an empty
     feed is a good state, not a dead end; the reassurance IS the
     content, and "never marketing" is a product promise stated
     where it is testable. */
  if (state.fresh) return `
  ${bar('Notifications')}
  <div class="scroll">
    <div class="empty">
      <img class="glyph" src="img/icons/ph-line/bell.svg" alt="">
      <div style="font-weight:700;color:var(--text-primary);margin-bottom:6px">All quiet.</div>
      <div>We only ping you about your care &mdash; visit updates, results, and
        messages from your team. Never marketing.</div>
    </div>
  </div>
  ${tabbar('notifs')}`;
  /* V1 (pricing -> V2): the payment-receipt item is hidden with the
     receipt screen; restore both together. */
  const fresh = [
    state.cx
      ? ['drop',   'Visit cancelled',         'Blood draw at home &middot; cancelled before arrival', 'now', `go('cancel')`]
      /* R2.2b: the stop gets a neutral push title — the bad news
         is delivered inside the app, never in a preview. */
      : state.nodraw
      ? ['care',   'About today&rsquo;s draw', 'We couldn&rsquo;t finish &mdash; what happens next is inside', '2:52 PM', `go('nodraw')`]
      : ['drop',   'Jennifer is on the way',  'Blood draw &middot; arrives about 2:40 PM', 'now',   `go('track')`],
    /* R2.2b: the accepted moment — the promise Requested made. */
    ['drop',     'You have a nurse',        'Jennifer accepted Wednesday&rsquo;s draw &middot; tap to get ready', '12:40 PM', `go('accepted')`],
    ['chat',     'New message',             'Dr. Anand: &ldquo;Your results look good overall.&rdquo;', '11:02 AM', `state.thread='anand';go('thread')`],
    /* R2.2: cancelling or moving the video visit rewrites the
       reminder — the feed never contradicts the calendar. */
    state.vcx
      ? ['calendar', 'Visit cancelled',     'Dr. Priya Anand &middot; the video visit is off; nothing is charged', '9:00 AM', `go('vcancel')`]
      : ['calendar', 'Visit reminder',      `Dr. Priya Anand &middot; ${state.moved ? vWhenShort() : 'tomorrow, 10:15 AM'}`, '9:00 AM', `go('precall')`],
    /* R2.2: the declined request lands here first. The push title
       stays neutral — the disappointment is delivered inside the
       app, never in a lock-screen preview. */
    ['care',     'About your Thursday request', 'Dr. Okafor&rsquo;s practice can&rsquo;t take new patients &middot; other options inside', '8:12 AM', `go('declined')`],
  ];
  const earlier = [
    ['flask',    'Lab results ready',       'Lipid panel &middot; reviewed by Dr. Anand', 'Yesterday', `go('results')`],
    ...(V2VIEW ? [['lock', 'Payment receipt', '$77.50 &middot; blood draw at home', 'Yesterday', `go('receipt')`]] : []),
  ];
  const row = ([ico, t, sub, time, act], unread) => `
      <button class="row${unread ? ' unread' : ''}" onclick="${act}">
        <span class="nicon"><img src="img/icons/ph-${unread ? 'fill' : 'line'}/${ico}.svg" alt=""></span>
        <span class="body">
          <span class="title">${t}</span>
          <span class="sub">${sub}</span>
        </span>
        <span class="nmeta"><span class="ntime">${time}</span>${unread ? '<span class="udot" aria-label="Unread"></span>' : ''}</span>
      </button>`;
  return `
  ${bar('Notifications')}
  <div class="scroll">
    ${fresh.map(i => row(i, true)).join('')}
    ${earlier.map(i => row(i, false)).join('')}
    <p class="tiny" style="text-align:center;margin-top:24px">That&rsquo;s everything from the last 7 days.</p>
  </div>
  ${tabbar('notifs')}`;
}

  const dob = (document.getElementById('dob') || {}).value || '';
  const yr = (dob.match(/(19|20)\d\d/) || [])[0];
  go(yr && 2026 - yr < 18 ? 'minor' : 'verify');
}

/* ---------- router ---------- */
const routes = {
  home: Home, getcare: GetCare, doctors: Doctors, docprofile: DocProfile,
  vrequested: VRequested, book: Book, confirmed: Confirmed,
  precall: PreCall, waiting: Waiting, call: Call, postcall: PostCall,
  collect: Collect, price: Price, requested: Requested, track: Track,
  visits: Visits, msgs: Msgs, you: You, profile: Profile,
  results: () => Results(0), resultsall: () => Results(1), trends: () => Results(2),
  thread: Thread, summary: Summary,
  splash: Splash, onboard: Onboard,
  welcome: Welcome, signup: Signup, verify: Verify, notifs: Notifs,
  /* R2.1 — the former stubs */
  insurance: Insurance, family: Family, payment: Payment, editfield: EditField,
  tests: Tests, address: Address, cancel: Cancel, receipt: Receipt,
  /* R2.2 — the five backlog screens (built 2026-07-20). verifyerr
     is the board's window onto the error state; manage shows the
     cancelled truth once the visit is off. */
  verifyerr: () => Verify(1), minor: Minor, terms: Terms,
  manage: () => state.vcx ? VCancel() : Manage(),
  reschedule: Reschedule, moved: Moved, vcancel: VCancel, declined: Declined,
  /* R2.2b — the draw's missing states. #late renders Track's late
     variant without touching state; #nodraw flips the demo into
     the safe-stop timeline (rebooking clears it). */
  accepted: Accepted, late: () => Track(1),
  nodraw: () => { state.nodraw = true; return NoDraw(); },
  /* R2.2c — the board's window onto Visits search mid-query. */
  vsearch: () => Visits('lipid'),
  /* R2.2d — the system states (built 2026-07-21, reviewed on
     mock-system-states.html). Pure routes like #late: #loading,
     #cantload, #offline and #offtrack render states without
     touching the demo. #fresh (or ?fresh in the URL) is the one
     switch that flips the whole app to day zero; the three empty*
     routes are the board's windows onto its feeds. Busy buttons
     are behavior, not a screen: #busy lands on Book the draw,
     where picking a window and tapping the CTA shows the grammar. */
  loading: VisitsLoading, cantload: ResultsFail,
  offline: () => Home(1), offtrack: OffTrack,
  fresh: () => { state.fresh = true; return Home(); },
  busy: () => Collect(),
  emptyvisits: () => { state.fresh = true; state.vtab = 0; return Visits(); },
  emptynotifs: () => { state.fresh = true; return Notifs(); },
  emptyfam: () => { state.fresh = true; return Results(0); },
};

function render() {
  const r = (location.hash || '#home').slice(1);
  const view = routes[r] || Home;
  app.className = 'app' + (r === 'call' || r === 'waiting' ? ' on-dark' : '');
  app.innerHTML = view();
  /* bust icon cache on http; in the artifact these are data: URIs
     and the selector matches nothing */
  app.querySelectorAll('img[src^="img/icons/"]').forEach(im =>
    im.src = im.getAttribute('src') + '?v=' + ICONS_V);
  const s = app.querySelector('.scroll');
  if (s) s.scrollTop = 0;
}

window.addEventListener('hashchange', render);
render();
</script>
